    <rect x="800" y="450" width="200" height="100" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="820" cy="470" r="4" fill="#a78bfa"/>
    <text x="832" y="474" fill="#a78bfa" font-size="12" font-weight="bold">POSTGRES + PGVECTOR</text>
    <text x="820" y="498" fill="#c4b5fd" font-size="10">localhost:15433</text>
    <text x="820" y="515" fill="#c4b5fd" font-size="9">• companies  (10,983)</text>
    <text x="820" y="529" fill="#c4b5fd" font-size="9">• company_embeddings  vector(1024)</text>
    <text x="820" y="543" fill="#c4b5fd" font-size="9">• eval_runs  (leaderboard history)</text>
  </g>

