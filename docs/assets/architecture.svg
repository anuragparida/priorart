    <text x="1100" y="666" fill="#94a3b8" font-size="9" text-anchor="middle">localhost:15000</text>
    <text x="1100" y="682" fill="#94a3b8" font-size="9" text-anchor="middle">params · metrics · artifacts · compare</text>
  </g>

  <!-- ===== Dagster (Phase 3, dashed amber boundary) ===== -->
  <g>
    <rect x="380" y="690" width="520" height="180" rx="12" fill="rgba(120, 53, 15, 0.10)" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="8 4"/>
