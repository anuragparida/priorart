    <rect x="800" y="620" width="160" height="80" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
    <rect x="800" y="620" width="160" height="80" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="880" y="647" fill="#cbd5e1" font-size="11" text-anchor="middle" font-weight="bold">LANGFUSE</text>
    <text x="880" y="666" fill="#94a3b8" font-size="9" text-anchor="middle">localhost:13000/13001</text>
    <text x="880" y="682" fill="#94a3b8" font-size="9" text-anchor="middle">LLM traces · scoring · feedback</text>
  </g>

  <!-- ===== MLflow ===== -->
  <g>
    <rect x="1020" y="620" width="160" height="80" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
    <rect x="1020" y="620" width="160" height="80" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
