      <rect x="400" y="755" width="100" height="35" rx="4" fill="rgba(120, 53, 15, 0.30)" stroke="#fbbf24" stroke-width="1"/>
      <text x="450" y="771" fill="#fde68a" text-anchor="middle">yc_directory</text>
      <text x="450" y="784" fill="#fcd34d" text-anchor="middle" font-size="8">@asset</text>

      <rect x="510" y="755" width="100" height="35" rx="4" fill="rgba(120, 53, 15, 0.30)" stroke="#fbbf24" stroke-width="1"/>
      <text x="560" y="771" fill="#fde68a" text-anchor="middle">product_hunt_archive</text>
      <text x="560" y="784" fill="#fcd34d" text-anchor="middle" font-size="8">@asset</text>

      <rect x="620" y="755" width="100" height="35" rx="4" fill="rgba(120, 53, 15, 0.30)" stroke="#fbbf24" stroke-width="1"/>
      <text x="670" y="771" fill="#fde68a" text-anchor="middle">hn_show_posts</text>
      <text x="670" y="784" fill="#fcd34d" text-anchor="middle" font-size="8">@asset</text>

      <rect x="730" y="755" width="155" height="35" rx="4" fill="rgba(120, 53, 15, 0.30)" stroke="#fbbf24" stroke-width="1"/>
      <text x="807" y="771" fill="#fde68a" text-anchor="middle">company_embeddings (merged)</text>
      <text x="807" y="784" fill="#fcd34d" text-anchor="middle" font-size="8">@asset · HNSW</text>

      <rect x="400" y="810" width="220" height="35" rx="4" fill="rgba(120, 53, 15, 0.20)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="510" y="826" fill="#fde68a" text-anchor="middle">@daily_schedule nightly_re_embedding</text>
      <text x="510" y="839" fill="#fcd34d" text-anchor="middle" font-size="8">on snapshot change</text>

      <rect x="640" y="810" width="245" height="35" rx="4" fill="rgba(120, 53, 15, 0.20)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="762" y="826" fill="#fde68a" text-anchor="middle">@sensor config_change → eval_regression_job</text>
      <text x="762" y="839" fill="#fcd34d" text-anchor="middle" font-size="8">fires eval.run on configs/*.yaml mtime change</text>
    </g>
  </g>

  <!-- ===== Eval harness ===== -->
  <g>
    <rect x="1000" y="730" width="200" height="125" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
    <rect x="1000" y="730" width="200" height="125" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="1020" cy="750" r="4" fill="#34d399"/>
    <text x="1032" y="754" fill="#34d399" font-size="12" font-weight="bold">EVAL HARNESS</text>
    <text x="1020" y="775" fill="#a7f3d0" font-size="10">python -m src.eval.run</text>
    <text x="1020" y="793" fill="#6ee7b7" font-size="9">→ 3 configs (dense / bm25 / hybrid_rrf)</text>
    <text x="1020" y="807" fill="#6ee7b7" font-size="9">→ 300-idea benchmark</text>
    <text x="1020" y="821" fill="#6ee7b7" font-size="9">→ MRR / nDCG@10 / P@5 / R@10 / FPR</text>
    <text x="1020" y="835" fill="#6ee7b7" font-size="9">→ logs run to MLflow</text>
  </g>

  <!-- ===== Leaderboard CSV ===== -->
  <g>
    <rect x="1050" y="855" width="180" height="30" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
    <rect x="1050" y="855" width="180" height="30" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="1140" y="874" fill="#a78bfa" font-size="10" text-anchor="middle">results/leaderboard.csv</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(60, 30)">
    <text x="0" y="0" fill="#22d3ee" font-size="11" font-weight="bold">PriorArt · system architecture (v2 · Phase 2)</text>
    <text x="0" y="16" fill="#64748b" font-size="9">Dark theme · slate-950 grid · JetBrains Mono</text>
  </g>

  <!-- Legend (bottom, outside any boundary) -->
  <g transform="translate(60, 758)" font-size="10">
    <!-- This is above the Dagster boundary which starts at y=690. The legend goes BELOW that. Move further down to y=875 isn't viable either. Let's place it at the bottom-right corner. -->
  </g>

  <!-- Legend (right side, vertical column) -->
  <g transform="translate(820, 30)" font-size="9">
    <text x="0" y="0" fill="#cbd5e1" font-size="10" font-weight="bold">LEGEND</text>
    <rect x="0" y="10" width="12" height="12" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
    <text x="18" y="20" fill="#cbd5e1">Frontend (Vite + React)</text>

    <rect x="0" y="28" width="12" height="12" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
    <text x="18" y="38" fill="#cbd5e1">Backend (FastAPI / Temporal)</text>

    <rect x="0" y="46" width="12" height="12" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
    <text x="18" y="56" fill="#cbd5e1">Database (pgvector)</text>

    <rect x="0" y="64" width="12" height="12" rx="2" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1"/>
    <text x="18" y="74" fill="#cbd5e1">External / observability</text>

    <rect x="0" y="82" width="12" height="12" rx="2" fill="rgba(120, 53, 15, 0.30)" stroke="#fbbf24" stroke-width="1"/>
    <text x="18" y="92" fill="#cbd5e1">Phase 3 (Dagster)</text>

    <line x1="0" y1="105" x2="14" y2="105" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="18" y="109" fill="#cbd5e1">solid: synchronous</text>

    <line x1="0" y1="119" x2="14" y2="119" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2 3"/>
    <text x="18" y="123" fill="#cbd5e1">dotted: async / trace</text>

    <line x1="0" y1="133" x2="14" y2="133" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6 3"/>
    <text x="18" y="137" fill="#cbd5e1">amber dashed: scheduled</text>

    <line x1="0" y1="147" x2="14" y2="147" stroke="#fb7185" stroke-width="1.2" stroke-dasharray="4 4"/>
    <text x="18" y="151" fill="#cbd5e1">rose dashed: web fallback</text>
  </g>

  <!-- Footer -->
  <text x="640" y="893" fill="#475569" font-size="8" text-anchor="middle">rendered from docs/ARCHITECTURE.md · Boundary rule: Temporal = per-idea workflow (long-running, signal-based); Dagster = batch data platform (Phase 3, scheduled + sensor-driven)</text>
</svg>