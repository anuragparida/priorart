<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" font-family="'JetBrains Mono', 'DejaVu Sans Mono', monospace" font-size="12">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="900" fill="#020617"/>
  <rect width="1280" height="900" fill="url(#grid)"/>

  <!-- Arrows (drawn early so they render behind boxes) -->
  <!-- User → FastAPI -->
  <line x1="220" y1="160" x2="220" y2="230" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="232" y="200" fill="#22d3ee" font-size="9">POST /ideas/analyze</text>

  <!-- FastAPI → Temporal -->
  <line x1="220" y1="310" x2="220" y2="380" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="232" y="350" fill="#34d399" font-size="9">start_workflow</text>

  <!-- Temporal → Postgres (embed_idea + ann_search read pgvector) -->
  <line x1="430" y1="490" x2="800" y2="490" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="500" y="478" fill="#a78bfa" font-size="9">embed_idea · ann_search</text>

  <!-- Temporal → Claude (LLM call) -->
  <line x1="430" y1="445" x2="800" y2="345" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-emerald)"/>
  <text x="500" y="395" fill="#34d399" font-size="9">llm_compare_topk</text>

  <!-- Temporal → Langfuse (traces on every LLM call) -->
  <line x1="430" y1="535" x2="800" y2="660" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2 3" marker-end="url(#arrow)"/>
  <text x="500" y="605" fill="#94a3b8" font-size="9">trace metadata + scoring</text>

  <!-- Eval → MLflow -->
  <line x1="1120" y1="745" x2="1120" y2="660" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2 3" marker-end="url(#arrow)"/>
  <text x="1130" y="710" fill="#94a3b8" font-size="9">log run</text>

  <!-- Eval → Leaderboard CSV -->
  <line x1="1100" y1="810" x2="1100" y2="855" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1110" y="838" fill="#94a3b8" font-size="9">append row</text>

  <!-- Temporal → Web fallback (SearXNG / Firecrawl) -->
  <line x1="430" y1="490" x2="55" y2="490" stroke="#fb7185" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow-rose)"/>
  <text x="60" y="478" fill="#fb7185" font-size="9">web_fallback_if_empty</text>

  <!-- Dagster → Postgres (nightly refresh) -->
  <line x1="620" y1="775" x2="830" y2="555" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow-amber)"/>
  <text x="660" y="700" fill="#fbbf24" font-size="9">nightly re-embed (Phase 3)</text>

  <!-- Dagster → Eval (sensor on config change) -->
  <line x1="800" y1="800" x2="1000" y2="800" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow-amber)"/>
  <text x="830" y="792" fill="#fbbf24" font-size="9">config_change sensor → eval regression (Phase 3)</text>

  <!-- ===== Frontend ===== -->
  <g>
    <rect x="60" y="60" width="320" height="100" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
    <rect x="60" y="60" width="320" height="100" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="80" cy="80" r="4" fill="#22d3ee"/>
    <text x="92" y="84" fill="#22d3ee" font-size="12" font-weight="bold">USER / BROWSER</text>
    <text x="80" y="110" fill="#22d3ee" font-size="11">Vite + React 19 + shadcn/ui</text>
    <text x="80" y="128" fill="#7dd3fc" font-size="9">localhost:15174 · dark mode</text>
    <text x="80" y="146" fill="#7dd3fc" font-size="9">paste idea → ranked competitors + structured verdicts</text>
  </g>

  <!-- ===== FastAPI ===== -->
  <g>
    <rect x="60" y="230" width="320" height="80" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
    <rect x="60" y="230" width="320" height="80" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="80" cy="250" r="4" fill="#34d399"/>
    <text x="92" y="254" fill="#34d399" font-size="12" font-weight="bold">FASTAPI</text>
    <text x="80" y="280" fill="#34d399" font-size="11">localhost:18000</text>
    <text x="80" y="296" fill="#6ee7b7" font-size="9">validates request → starts Temporal workflow</text>
  </g>

  <!-- ===== Web fallback (SearXNG → Firecrawl) ===== -->
  <g>
    <rect x="40" y="450" width="60" height="80" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
    <rect x="40" y="450" width="60" height="80" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="70" y="478" fill="#94a3b8" font-size="9" text-anchor="middle">SearXNG</text>
    <text x="70" y="495" fill="#94a3b8" font-size="9" text-anchor="middle">→</text>
    <text x="70" y="512" fill="#94a3b8" font-size="9" text-anchor="middle">Firecrawl</text>
  </g>

  <!-- ===== Temporal ===== -->
  <g>
    <rect x="110" y="380" width="640" height="220" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
    <rect x="110" y="380" width="640" height="220" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="130" cy="400" r="4" fill="#34d399"/>
    <text x="142" y="404" fill="#34d399" font-size="12" font-weight="bold">TEMPORAL · localhost:7233 (UI)</text>
    <text x="130" y="425" fill="#6ee7b7" font-size="10">IdeaAnalysisWorkflow</text>

