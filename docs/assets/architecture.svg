      <rect x="130" y="445" width="100" height="40" rx="4" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
      <text x="180" y="461" fill="#a7f3d0" text-anchor="middle">embed_idea</text>
      <text x="180" y="475" fill="#6ee7b7" text-anchor="middle" font-size="8">bge-m3</text>

      <rect x="240" y="445" width="100" height="40" rx="4" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
      <text x="290" y="461" fill="#a7f3d0" text-anchor="middle">ann_search</text>
      <text x="290" y="475" fill="#6ee7b7" text-anchor="middle" font-size="8">pgvector HNSW</text>

      <rect x="350" y="445" width="100" height="40" rx="4" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
      <text x="400" y="461" fill="#a7f3d0" text-anchor="middle">llm_compare_topk</text>
      <text x="400" y="475" fill="#6ee7b7" text-anchor="middle" font-size="8">Claude Sonnet 4.5</text>

      <rect x="460" y="445" width="100" height="40" rx="4" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
      <text x="510" y="461" fill="#a7f3d0" text-anchor="middle">market_scope</text>
      <text x="510" y="475" fill="#6ee7b7" text-anchor="middle" font-size="8">Qwen 2.5 32B</text>

      <rect x="130" y="495" width="100" height="40" rx="4" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
      <text x="180" y="511" fill="#a7f3d0" text-anchor="middle">web_fallback</text>
      <text x="180" y="525" fill="#6ee7b7" text-anchor="middle" font-size="8">if top_k empty</text>

      <rect x="240" y="495" width="100" height="40" rx="4" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
      <text x="290" y="511" fill="#a7f3d0" text-anchor="middle">assemble</text>
      <text x="290" y="525" fill="#6ee7b7" text-anchor="middle" font-size="8">pure function</text>

      <rect x="350" y="495" width="160" height="40" rx="4" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
      <text x="430" y="511" fill="#a7f3d0" text-anchor="middle">signal: review (low-confidence band)</text>
      <text x="430" y="525" fill="#6ee7b7" text-anchor="middle" font-size="8">wait for human → resume</text>
    </g>
  </g>

  <!-- ===== Claude (LLM, external) ===== -->
  <g>
    <rect x="800" y="305" width="160" height="80" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
    <rect x="800" y="305" width="160" height="80" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="880" y="332" fill="#cbd5e1" font-size="11" text-anchor="middle" font-weight="bold">Claude Sonnet 4.5</text>
    <text x="880" y="352" fill="#94a3b8" font-size="9" text-anchor="middle">structured compare</text>
    <text x="880" y="368" fill="#94a3b8" font-size="9" text-anchor="middle">Pydantic v2 + instructor</text>
