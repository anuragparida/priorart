# PriorArt model registry — Phase 2.7 (docs/PHASE-2.md §2.7)
#
# Single source of truth for the operator: which embedding model is
# live, which LLM is wired into the analyzer, which corpus snapshots
# are currently ingested, and which retrieval configs are evaluated
# against the labeled benchmark. The eval harness and the API both
# read this file indirectly (via ``src.config`` for model + dim,
# via ``configs/*.yaml`` for retrieval configs); the corpus
# snapshot dates + per-source counts are the only fields that live
# exclusively here.

# Pinned by Phase 1.3 — the CV line is "pgvector + bge-m3 retrieval",
# so the version is part of the public claim.
embedding_model: BAAI/bge-m3
embedding_dim: 1024

# Phase 1.7 — the analyzer's structured-comparison call. Falls back
# to a structured-abstention body when ANTHROPIC_API_KEY is missing.
llm_model: claude-sonnet-4-5

# Per-source corpus snapshots — Phase 2.7 merged three sources into
# one table. ``snapshot_date`` is the date the JSONL was written
# (not when the row landed in Postgres); ``count`` is the per-source
# row count after the cross-source cosine dedup (≥ 0.85). The
# ``make corpus-build`` target refreshes this section automatically.
corpus:
  yc:
    snapshot_date: "2026-06-08"
    snapshot_path: data/snapshots/yc_2026-06-08.jsonl
    count: 5949
    source_url: https://www.ycombinator.com/companies
  producthunt:
    snapshot_date: "2026-06-29"
    snapshot_path: data/snapshots/producthunt_2026-06-29.jsonl
    count: 3752  # post Phase-2.5 dedup vs YC; refresh from data/snapshots/producthunt_*.manifest.json
    source_url: https://web.archive.org/web/2026*/https://www.producthunt.com/leaderboard/daily
  hn:
    snapshot_date: "2026-06-29"
    snapshot_path: data/snapshots/hn_show_2026-06-29.jsonl
    count: 1000
    source_url: https://hn.algolia.com/api/v1/search

# The merged manifest — produced by ``make corpus-build``. Listed
# here so operators can find it from this one file.
manifest:
  path: data/snapshots/corpus_2026-06-29.manifest.json
  schema_version: "1.0.0"

# Dedup configuration. The cross-source cosine threshold (≥ 0.85 on
# bge-m3 name embeddings) matches the Phase 2.5 PH-vs-YC threshold
# so the boundary is consistent across the whole pipeline.
dedup:
  cross_source_cosine_threshold: 0.85
  source_precedence: [yc, producthunt, hn]

# ---------------------------------------------------------------------
# Dagster (Phase 3.1 — card t_7928b3e2)
# ---------------------------------------------------------------------
#
# The single source of truth for the Dagster batch data platform:
# which assets exist, which job the nightly schedule fires, and
# which cron expression Dagster uses. The Dagster definitions
# module (``src/dagster_assets/definitions.py``) mirrors the asset
# list and the schedule job name from this section; the YAML is
# the operator-facing record of "what's wired into the batch data
# platform" without having to read Python.
#
# Why the cron lives here, not in Python
# --------------------------------------
# `nightly_re_embedding_schedule` in ``src/dagster_assets/assets.py``
# reads ``dagster.nightly_re_embedding.cron`` from this file via the
# `eval_benchmark` asset's models.yaml reader. The schedule object
# itself is constructed at module-import time with the values from
# ``assets.py`` (Dagster requires cron at construction); the
# ``models.yaml`` value is the auditable record + the sensor's
# cron-validation hook (Phase 3.2 sensor will read this).
dagster:
  webserver_port: 13002
  # The 5 assets wrapped from Phase 1.2/2.5/2.6/2.7 + the eval-set
  # freshness check. Names mirror ``src/dagster_assets/assets.py``.
  assets:
    - yc_directory
    - product_hunt_archive
    - hn_show_posts
    - company_embeddings
    - eval_benchmark
  nightly_re_embedding:
    job_name: nightly_re_embedding_job
    cron: "30 2 * * *"   # 02:30 UTC every day
    execution_timezone: UTC
    selection:            # assets materialized by the job
      - yc_directory
      - product_hunt_archive
      - hn_show_posts
      - company_embeddings
    # Skip-on-no-change behaviour is handled inside the
    # ``company_embeddings`` asset (mtime check vs the latest
    # corpus manifest). The DAGSTER_PORT below is what
    # ``docker compose up -d dagster`` binds.
  # Phase 3.2 (card t_877e48cd) — the config-change sensor that
  # fires the eval-harness regression on a YAML edit. Declared
  # here so the operator can see the surface, but the sensor
  # implementation lands in 3.2.
  config_change_sensor:
    watch_paths:
      - configs/
      - models.yaml
    target_job: eval_regression_job
  # Phase 3.6 (card t_e0f62c2a) — the GitHub Actions regression
  # workflow. Listed here for traceability.
  eval_regression:
    action: .github/workflows/eval-regression.yml
    trigger_paths:
      - configs/**
      - evals/**
      - src/embedding/**
      - src/llm/**
      - models.yaml
  eval_benchmark:
    # The label Dagster surfaces on the asset detail page.
    # Bumped per eval-set release (1.5a, 2.8, 3.4, …).
    version: v300-llm-v2
    # The Path the asset points at. ``eval_benchmark`` reads it
    # back off the filesystem to surface the record count + age.
    path: evals/labeled_v300.jsonl